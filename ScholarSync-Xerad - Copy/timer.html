<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScholarSync | Timer</title>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <section>
        <body class="dashboard-body">
            <div class="app-container">
                <aside class="sidebar">
                    <div class="logo">
                        <i class="fas fa-graduation-cap"></i>
                        <span>ScholarSync</span>
                    </div>
                    <nav>
                        <a href="dashboard.html" ><i class="fas fa-th-large"></i> Dashboard</a>
                        <a href="task.html"><i class="fas fa-check-double"></i> Tasks</a>
                        <a href="notes.html"><i class="fas fa-sticky-note"></i> Notes</a>
                        <a href="sched.html"><i class="fas fa-calendar-alt"></i> Schedule</a>
                        <a href="#" class="active"><i class="fas fa-stopwatch"></i> Timer</a>
                        <div class="nav-divider"></div>
                        <a href="#" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</a>
                    </nav>
                </aside>

                <main class="main-content">
                    <header class="top-nav">
                        <div class="welcome-header">
                            <h1>Welcome back, <span id="welcomeName">Darex</span>! 👋</h1>
                            <p>Ready to achieve your goals today?</p>
                        </div>
                        <div class="header-right">
                            <div class="search-bar">
                                <i class="fas fa-search"></i>
                                <input type="text" placeholder="Search your desk...">
                            </div>
                        </div>
                    </header>

                    

                    <footer class="dashboard-footer">
                        <p>"Small steps every day lead to big results."</p>
                    </footer>
                </main>
            </div>
    </section>
    <script>
        function getCurrentUser() {
            const raw = localStorage.getItem('currentUser') || sessionStorage.getItem('currentUser');
            return raw ? JSON.parse(raw) : null;
        }

        const currentUser = getCurrentUser();
        if (!currentUser) {
            window.location.href = 'index.html';
        } else {
            const welcomeEl = document.getElementById('welcomeName');
            if (welcomeEl) welcomeEl.textContent = currentUser.firstName || currentUser.username || 'Friend';
        }

        const logoutBtn = document.getElementById('logoutBtn');
        if (logoutBtn) {
            logoutBtn.addEventListener('click', (e) => {
                e.preventDefault();
                localStorage.removeItem('currentUser');
                localStorage.removeItem('isLoggedIn');
                sessionStorage.removeItem('currentUser');
                window.location.href = 'index.html';
            });
        }
    </script>
</body>
</html>

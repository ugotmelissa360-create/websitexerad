<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register | ScholarSync</title>
    <link rel="stylesheet" href="login.css" />
    <style>
        .login-box {
            height: 620px; 
            width: 450px;
        }
        .input-box {
            margin: 20px 0;
        }
        .register-link {
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <section>
        <div class="login-box">
            <form id="registerForm">
                <h2>Register</h2>
                
                <div style="display: flex; gap: 10px;">
                    <div class="input-box" style="width: 150px;">
                        <input type="text" id="firstName" required />
                        <label>First Name</label>
                    </div>
                    <div class="input-box" style="width: 150px;">
                        <input type="text" id="lastName" required />
                        <label>Last Name</label>
                    </div>
                </div>

                <div class="input-box">
                    <span class="icon"><ion-icon name="person"></ion-icon></span>
                    <input type="text" id="regUsername" required />
                    <label>Username</label>
                </div>

                <div class="input-box">
                    <span class="icon"><ion-icon name="mail"></ion-icon></span>
                    <input type="email" id="regEmail" required />
                    <label>Email</label>
                </div>

                <div class="input-box">
                    <span class="icon"><ion-icon name="lock-closed"></ion-icon></span>
                    <input type="password" id="regPass" required />
                    <label>Password</label>
                </div>

                <div class="input-box">
                    <span class="icon"><ion-icon name="shield-checkmark"></ion-icon></span>
                    <input type="password" id="confirmPass" required />
                    <label>Confirm Password</label>
                </div>

                <div class="remember-forgot">
                    <label><input type="checkbox" id="terms" required /> I agree to the terms</label>
                </div>

                <button type="submit">Register</button>

                <div class="register-link">
                    <p>Already have an account? <a href="index.html">Login</a></p>
                </div>
            </form>
        </div>
    </section>

    <!-- JavaScript for Registration Logic -->
    <script>
        const registerForm = document.getElementById('registerForm');

        registerForm.addEventListener('submit', (e) => {
            e.preventDefault();

            // Get values
            const firstName = document.getElementById('firstName').value;
            const lastName = document.getElementById('lastName').value;
            const username = document.getElementById('regUsername').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPass').value;
            const confirmPass = document.getElementById('confirmPass').value;

            // 1. Basic Validations
            if (password !== confirmPass) {
                alert("Passwords do not match!");
                return;
            }

            // 2. Check for unique user/email in existing users
            const users = JSON.parse(localStorage.getItem('users')) || [];
            
            if (users.find(u => u.username === username)) {
                alert("Username already taken.");
                return;
            }
            if (users.find(u => u.email === email)) {
                alert("Email already registered.");
                return;
            }

            // 3. Generate 6-digit code
            const vCode = Math.floor(100000 + Math.random() * 900000);

            // 4. Save temp data to localStorage
            const tempUser = { firstName, lastName, username, email, password, vCode };
            localStorage.setItem('tempUser', JSON.stringify(tempUser));

            // 5. Simulate email & redirect
            alert(`ScholarSync Verification Code: ${vCode}`);
            window.location.href = "verify.html";
        });
    </script>

    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
</body>
</html>

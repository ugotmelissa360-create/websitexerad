<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScholarSync | Notes</title>

    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght=300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="notes.css">
</head>

<body class="dashboard-body">

<div class="app-container">

    <aside class="sidebar">
        <div class="logo">
            <i class="fas fa-graduation-cap"></i>
            <span>ScholarSync</span>
        </div>

        <nav>
            <a href="dashboard.html"><i class="fas fa-th-large"></i> Dashboard</a>
            <a href="task.html"><i class="fas fa-check-double"></i> Tasks</a>
            <a href="#" class="active"><i class="fas fa-sticky-note"></i> Notes</a>
            <a href="sched.html"><i class="fas fa-calendar-alt"></i> Schedule</a>
            <a href="timer.html"><i class="fas fa-stopwatch"></i> Timer</a>
            <div class="nav-divider"></div>
            <a href="#" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</a>
        </nav>
    </aside>

    <main class="main-content">

        <header class="top-nav">
            <div class="welcome-header">
                <h1>My Notes</h1>
                <p>Organize your thoughts easily</p>
                
                <div class="controls-row-left">
                    <div class="view-dropdown-container">
                        <i class="fas fa-filter dropdown-icon"></i>
                        <select id="viewFilterSelect" onchange="changeViewMode()">
                            <option value="newest">Newest First</option>
                            <option value="oldest">Oldest First</option>
                            <option value="grouped">Group by Date</option>
                        </select>
                    </div>

                    <button class="select-toggle-btn" id="selectToggleBtn" onclick="toggleSelectMode()">
                        <i class="fas fa-tasks"></i> Select Notes
                    </button>
                </div>
            </div>

            <div class="header-right">
                <div class="search-bar">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchInput" placeholder="Search notes...">
                </div>
            </div>
        </header>

        <div id="notesWorkspace">
            <div class="notes-grid" id="notesContainer"></div>
        </div>

        <footer class="dashboard-footer">
            <p>"Small steps every day lead to big results."</p>
        </footer>

    </main>
</div>

<button class="floating-btn" id="mainFloatingBtn" onclick="openModal(false)"> 
    <i class="fas fa-plus"></i> New Note
</button>

<div class="bulk-action-bar" id="bulkActionBar">
    <div class="bulk-info">
        <span id="selectedCount">0 items selected</span>
    </div>
    <div class="bulk-buttons">
        <button onclick="toggleSelectMode()" class="btn-bulk-cancel">Cancel</button>
        <button onclick="openBulkDeleteModal()" class="btn-bulk-delete">Delete Selected</button>
    </div>
</div>

<div class="modal" id="noteModal">
    <div class="modal-content">
        <h2 class="modal-title" id="modalTitle">Create New Note</h2>

        <div class="input-group">
            <label for="noteTitle">Note Title</label>
            <input type="text" id="noteTitle" placeholder="e.g., Biology Chapter 4 Summary">
        </div>

        <div class="input-group">
            <label for="noteContent">Content</label>
            <textarea id="noteContent" placeholder="Write your thoughts here..."></textarea>
        </div>

        <div class="modal-actions">
            <button onclick="closeModal()" class="btn-cancel">Cancel</button>
            <button onclick="handleSave()" class="btn-save" id="saveButton">Save Note</button>
        </div>
    </div>
</div>

<div class="modal" id="deleteModal">
    <div class="modal-content confirmation-content">
        <div class="warning-icon-wrapper">
            <i class="fas fa-exclamation-triangle"></i>
        </div>
        <h2 class="modal-title" id="deleteModalTitle">Delete Note</h2>
        <p class="confirmation-text" id="deleteModalText">Are you sure you want to delete this note?</p>
        
        <div class="modal-actions">
            <button onclick="closeDeleteModal()" class="btn-delete-cancel">Cancel</button>
            <button onclick="executeDeletion()" class="btn-delete-confirm">Delete</button>
        </div>
    </div>
</div>

<script>
function getCurrentUser() {
    const raw = localStorage.getItem('currentUser') || sessionStorage.getItem('currentUser');
    return raw ? JSON.parse(raw) : null;
}

const currentUser = getCurrentUser();
const notesKey = currentUser ? `notes_${currentUser.username}` : 'notes';

if (!currentUser) {
    // Not logged in — redirect to login to avoid showing other users' notes
    window.location.href = 'index.html';
}

let notes = currentUser ? (JSON.parse(localStorage.getItem(notesKey)) || []) : (JSON.parse(localStorage.getItem('notes')) || []);

// Logout handler (clears session and redirects to login)
const logoutBtn = document.getElementById('logoutBtn');
if (logoutBtn) {
    logoutBtn.addEventListener('click', (e) => {
        e.preventDefault();
        localStorage.removeItem('currentUser');
        localStorage.removeItem('isLoggedIn');
        sessionStorage.removeItem('currentUser');
        window.location.href = 'index.html';
    });
}
let editIndex = null; 
let deleteTargetIndex = null; 

let isSelectMode = false;
let selectedIndices = [];
let currentViewMode = "newest"; 

function saveNotes() {
    localStorage.setItem(notesKey, JSON.stringify(notes));
}

function changeViewMode() {
    currentViewMode = document.getElementById("viewFilterSelect").value;
    renderNotes();
}

function parseNoteDate(dateStr) {
    if (!dateStr) return new Date(0);
    return new Date(Date.parse(dateStr));
}

function getDateCategory(dateStr) {
    if (!dateStr) return "Older Notes";
    
    const noteDate = parseNoteDate(dateStr);
    const today = new Date();
    
    const noteMidnight = new Date(noteDate.getFullYear(), noteDate.getMonth(), noteDate.getDate());
    const todayMidnight = new Date(today.getFullYear(), today.getMonth(), today.getDate());
    
    const diffTime = todayMidnight - noteMidnight;
    const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));

    if (diffDays === 0) return "Today";
    if (diffDays === 1) return "Yesterday";
    if (diffDays < 7) return "This Week";
    return "Older Notes";
}

function generateNoteHTML(note) {
    const actualIndex = notes.indexOf(note);
    const isChecked = selectedIndices.includes(actualIndex);

    return `
        <div class="note-card ${isSelectMode ? 'selectable' : ''} ${isChecked ? 'selected' : ''}" 
             onclick="handleCardClick(event, ${actualIndex})">
            
            <div class="card-checkbox-wrapper ${isSelectMode ? 'visible' : ''}">
                <input type="checkbox" id="check-${actualIndex}" ${isChecked ? 'checked' : ''} 
                       onclick="event.stopPropagation(); handleCheckboxToggle(${actualIndex})">
                <label for="check-${actualIndex}" onclick="event.stopPropagation();"></label>
            </div>

            <div class="note-content-wrapper">
                <div class="note-header">
                    <h3>${note.title}</h3>
                    <span class="priority-badge">Note</span>
                </div>
                <p class="note-body">${note.content}</p>
            </div>

            <div class="note-footer-row">
                <span class="note-date">
                    <i class="far fa-calendar-alt"></i> ${note.date || 'No Date'}
                </span>
                <div class="note-actions" ${isSelectMode ? 'style="display: none;"' : ''}>
                    <button class="action-btn edit-btn" onclick="event.stopPropagation(); openModal(true, ${actualIndex})" title="Edit Note">
                        <i class="fas fa-pencil-alt"></i>
                    </button>
                    <button class="action-btn delete-btn" onclick="event.stopPropagation(); openDeleteModal(${actualIndex})" title="Delete Note">
                        <i class="fas fa-trash-alt"></i>
                    </button>
                </div>
            </div>
        </div>
    `;
}

function renderNotes() {
    const workspace = document.getElementById("notesWorkspace");
    const searchVal = document.getElementById("searchInput").value.toLowerCase();
    
    let filteredNotes = notes.filter(n =>
        n.title.toLowerCase().includes(searchVal) ||
        n.content.toLowerCase().includes(searchVal)
    );

    if (filteredNotes.length === 0) {
        workspace.innerHTML = `<div class="notes-grid"><p class="no-notes-message">No notes found matching your criteria.</p></div>`;
        updateBulkActionBar();
        return;
    }

    if (currentViewMode === "newest") {
        filteredNotes.sort((a, b) => parseNoteDate(b.date) - parseNoteDate(a.date));
        workspace.innerHTML = `<div class="notes-grid" id="notesContainer"></div>`;
        const container = document.getElementById("notesContainer");
        filteredNotes.forEach(note => { container.innerHTML += generateNoteHTML(note); });
        
    } else if (currentViewMode === "oldest") {
        filteredNotes.sort((a, b) => parseNoteDate(a.date) - parseNoteDate(b.date));
        workspace.innerHTML = `<div class="notes-grid" id="notesContainer"></div>`;
        const container = document.getElementById("notesContainer");
        filteredNotes.forEach(note => { container.innerHTML += generateNoteHTML(note); });
        
    } else if (currentViewMode === "grouped") {
        filteredNotes.sort((a, b) => parseNoteDate(b.date) - parseNoteDate(a.date));
        
        const groups = { "Today": [], "Yesterday": [], "This Week": [], "Older Notes": [] };
        filteredNotes.forEach(note => {
            const cat = getDateCategory(note.date);
            groups[cat].push(note);
        });

        workspace.innerHTML = ""; 
        
        ["Today", "Yesterday", "This Week", "Older Notes"].forEach(categoryTitle => {
            if (groups[categoryTitle].length > 0) {
                let sectionHTML = `
                    <div class="category-section">
                        <h2 class="category-section-title">${categoryTitle} <span class="category-count">(${groups[categoryTitle].length})</span></h2>
                        <div class="notes-grid">
                `;
                groups[categoryTitle].forEach(note => { sectionHTML += generateNoteHTML(note); });
                sectionHTML += `</div></div>`;
                workspace.innerHTML += sectionHTML;
            }
        });
    }

    updateBulkActionBar();
}

function toggleSelectMode() {
    isSelectMode = !isSelectMode;
    selectedIndices = []; 

    const toggleBtn = document.getElementById("selectToggleBtn");
    const mainFloatingBtn = document.getElementById("mainFloatingBtn");

    if (isSelectMode) {
        toggleBtn.innerHTML = `<i class="fas fa-times"></i> Exit Selection`;
        toggleBtn.classList.add("active");
        mainFloatingBtn.style.transform = "scale(0)"; 
    } else {
        toggleBtn.innerHTML = `<i class="fas fa-tasks"></i> Select Notes`;
        toggleBtn.classList.remove("active");
        mainFloatingBtn.style.transform = "scale(1)";
    }

    renderNotes();
}

function handleCardClick(event, index) {
    if (!isSelectMode) return;
    handleCheckboxToggle(index);
}

function handleCheckboxToggle(index) {
    const position = selectedIndices.indexOf(index);
    if (position > -1) {
        selectedIndices.splice(position, 1);
    } else {
        selectedIndices.push(index);
    }
    renderNotes();
}

function updateBulkActionBar() {
    const bar = document.getElementById("bulkActionBar");
    const countSpan = document.getElementById("selectedCount");

    if (isSelectMode && selectedIndices.length > 0) {
        countSpan.innerText = `${selectedIndices.length} note${selectedIndices.length > 1 ? 's' : ''} selected`;
        bar.classList.add("show");
    } else {
        bar.classList.remove("show");
    }
}

function openModal(isEdit = false, index = null) {
    const modalTitle = document.getElementById("modalTitle");
    const saveButton = document.getElementById("saveButton");
    
    if (isEdit && index !== null) {
        editIndex = index;
        modalTitle.innerText = "Edit Note Specified";
        saveButton.innerText = "Save Changes";
        
        document.getElementById("noteTitle").value = notes[index].title;
        document.getElementById("noteContent").value = notes[index].content;
    } else {
        editIndex = null;
        modalTitle.innerText = "Create New Note";
        saveButton.innerText = "Save Note";
        
        document.getElementById("noteTitle").value = "";
        document.getElementById("noteContent").value = "";
    }
    
    document.getElementById("noteModal").style.display = "flex";
}

function closeModal() {
    document.getElementById("noteModal").style.display = "none";
    editIndex = null;
}

function handleSave() {
    let title = document.getElementById("noteTitle").value;
    let content = document.getElementById("noteContent").value;

    if (!title || !content) return alert("Please fill in all fields.");

    const options = { month: 'short', day: 'numeric', year: 'numeric', hour: '2-digit', minute: '2-digit' };
    const timestamp = new Date().toLocaleDateString('en-US', options);

    if (editIndex !== null) {
        const originalDate = notes[editIndex].date || timestamp;
        notes[editIndex] = { title, content, date: originalDate };
    } else {
        notes.unshift({ title, content, date: timestamp });
    }

    saveNotes();
    renderNotes();
    closeModal();
}

function openDeleteModal(index) {
    deleteTargetIndex = index;
    document.getElementById("deleteModalTitle").innerText = "Delete Note";
    document.getElementById("deleteModalText").innerText = "Are you sure you want to delete this note?";
    document.getElementById("deleteModal").style.display = "flex";
}

function openBulkDeleteModal() {
    deleteTargetIndex = -1; 
    document.getElementById("deleteModalTitle").innerText = "Delete Selected Notes";
    document.getElementById("deleteModalText").innerText = `Are you sure you want to permanently delete these ${selectedIndices.length} notes?`;
    document.getElementById("deleteModal").style.display = "flex";
}

function closeDeleteModal() {
    document.getElementById("deleteModal").style.display = "none";
}

function executeDeletion() {
    if (deleteTargetIndex === -1) {
        selectedIndices.sort((a, b) => b - a);
        selectedIndices.forEach(idx => { notes.splice(idx, 1); });
        toggleSelectMode(); 
    } else if (deleteTargetIndex !== null) {
        notes.splice(deleteTargetIndex, 1);
    }
    
    saveNotes();
    renderNotes();
    closeDeleteModal();
}

document.getElementById("searchInput").addEventListener("input", function () {
    renderNotes();
});

renderNotes();
</script>

</body>
</html>
